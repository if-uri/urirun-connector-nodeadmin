name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  connector-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout urirun-connector-nodeadmin
        uses: actions/checkout@v4
        with:
          path: urirun-connector-nodeadmin

      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun
          path: _deps/urirun

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install urirun and current connector from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./_deps/urirun/adapters/python"
          python -m pip install -e "./urirun-connector-nodeadmin"

      - name: Verify connector import and safe bindings
        working-directory: urirun-connector-nodeadmin
        run: |
          python - <<'PY'

          import json
          from pathlib import Path
          from urirun_connector_nodeadmin.core import urirun_bindings

          SMOKE_ROUTE = "node://host/runtime/query/state"
          bindings = urirun_bindings()
          expected_routes = set(bindings.get("bindings", {}).keys())
          assert expected_routes, "connector emitted no bindings"
          assert SMOKE_ROUTE in expected_routes, "safe smoke route missing from bindings"
          text = json.dumps(bindings)
          print("Connector import and isolated bindings OK")
          PY

      - name: Build isolated registry and run safe smoke route
        run: |
          mkdir -p .urirun

          python - <<'PY'
          import json
          from pathlib import Path
          from urirun_connector_nodeadmin.core import urirun_bindings

          bindings = urirun_bindings()
          expected_routes = set(bindings.get("bindings", {}).keys())
          assert "node://host/runtime/query/state" in expected_routes, "safe smoke route missing"
          Path(".urirun/node.bindings.v2.json").write_text(
              json.dumps(bindings, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY

          urirun compile .urirun/node.bindings.v2.json --out .urirun/node.registry.json

          urirun run             'node://host/runtime/query/state'             .urirun/node.registry.json             --execute             --allow 'node://**'             | tee run-response.json

          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          print("Safe smoke route through urirun run OK")
          PY
